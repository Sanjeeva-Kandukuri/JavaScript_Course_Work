<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even Handling</title>
    <style>
        body{
            background-color: darkblue;
            height: 100vh;
            color: white;
            text-align: center;
            margin: 20px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 20px;

        }
        button{
            cursor: pointer;
            background-color: gainsboro;
            padding: 5px;
            border: none;
            width: 15%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h3>Event Handling Listeners</h3>
    <button id="btn">Clic Me</button>
</body>
<script>
    let btn = document.getElementById('btn');

    btn.addEventListener('click', ()=> {    // 3
        alert('Button Clicked');
    }) 
    
    btn.onclick = () =>{                  // 1
        alert('Button Clicks');
    }
    function add(){                        // 2
        alert('Clicked');
    }
</script>
</html>
