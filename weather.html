<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather API</title>
    <style>
        body{
            background-color: darkblue;
            height: 100vh;
            text-align: center;
            margin-bottom: 20px;
            margin-top: 20px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

        }
        h1{
            color: white;
            font-size: 25px;
            font-weight: bold;
        }
        input{
            width: 20%;
            padding: 3px;
            border-radius: 3px;
            border: none;
        }
        button{
            padding: 3px;
            color: darkcyan;
            font-size: 13px;
            font-weight: bold;
            width: 10%;
            border-radius: 3px;
            border: none;
        }
        p{
            font-size: 25px;
            font-weight: bold;
            color: cornflowerblue;
        }
        
    </style>
</head>
<body>
    <h1> 🌦️Weather API</h1>
    <input type="search" id="input" placeholder="Enter Your City"/>
    <button type="button" onclick="weather()">Get Weather</button>
    <p id="text"></p>
    <script src="weather.js">

    </script>
</body>
</html>
